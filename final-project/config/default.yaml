# --- Emotion detection ---
face_detector:
  model: "retinaface"
  confidence_threshold: 0.3
  select_strategy: "largest"
  bbox_expand: 0.2

emotion_detector:
  model: "enet_b0_8_va_mtl"
  input_size: 260

gaze_detector:
  model: "L2CSNet_gaze360"
  input_size: 448
  yaw_threshold: 25.0
  pitch_threshold: 20.0

# --- Posture detection ---
pose_detector:
  static_image_mode: false
  model_complexity: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  open_posture_min_ratio: 0.2
  open_posture_max_ratio: 1.2
  face_cover_ratio: 0.6
  depth_min_meters: 0.1
  depth_max_meters: 2.0
  history_size: 10
  depth_outlier_threshold: 0.4
  withdrawal_threshold_meters: 0.12
  posture_drop_threshold: 0.15

# --- Integrated comfort scoring ---
# Fusion weights are phase-dependent. Phase is set externally via
# IntegratedPipeline.set_phase("approach" | "intent" | "execution").
#
# Calibration (scripts/calibrate.py) tunes these by replaying sidecar-labeled
# recordings. The robot controller (§7.3) drives phase from its state machine.
#
# Rationale for defaults:
#   - intent:    gaze_weight is high — looking at the robot signals engagement.
#   - execution: gaze_weight is near-zero — the user naturally looks at the object,
#                not the robot; posture/depth carry the comfort signal.
#   - approach:  unused in calibration (pre-interaction), neutral defaults.
comfort:
  gamma: 0.5
  delta: 0.3
  mouth_cover_penalty: 30.0
  withdrawal_penalty: 25.0
  ema_time_constant_s: 0.5
  phase_warmup_s: 0.3
  no_face_decay_rate: 0.15       # per-second decay toward no_face_decay_target
  no_face_decay_target: 35.0
  no_pose_decay_rate: 0.30
  no_pose_decay_target: 50.0
  phase_weights:
    approach:
      emotion_weight: 0.5
      posture_weight: 0.5
      gaze_weight: 0.3
    intent:
      emotion_weight: 0.6
      posture_weight: 0.4
      gaze_weight: 0.6
    execution:
      emotion_weight: 0.35
      posture_weight: 0.65
      gaze_weight: 0.1

# --- Visualization ---
visualization:
  show_bbox: true
  show_comfort_bar: true
  show_emotion_text: true
  show_gaze_text: true
  show_posture_text: true
  show_depth_marker: true
  show_state_warnings: true
  show_fps: true
  show_phase: true
  bbox_thickness: 2

device: "cuda:0"
